appId: com.nomu.complianceflow
productName: Compliance Ready AI
copyright: Copyright (c) 2026 Nomu

directories:
  buildResources: electron/resources
  output: dist-electron

files:
  - out/**/*
  # Exclude build-time CSS tools with native binaries (break universal builds)
  - "!node_modules/@tailwindcss/**"
  - "!node_modules/tailwindcss/**"
  - "!node_modules/lightningcss*/**"
  - "!node_modules/@parcel/**"
  - "!node_modules/postcss/**"
  - "!node_modules/autoprefixer/**"

extraResources:
  - from: electron/resources/docker-compose.prod.yml
    to: docker-compose.prod.yml

# ── macOS ──
mac:
  category: public.app-category.developer-tools
  icon: electron/resources/icon.icns
  identity: null
  target:
    - target: dmg
      arch: universal
    # PKG requires code signing — uncomment when CSC_LINK is configured
    # - target: pkg
    #   arch: universal
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/resources/entitlements.mac.plist
  entitlementsInherit: electron/resources/entitlements.mac.plist
  extraFiles:
    - from: electron/resources/install-mac.command
      to: install-mac.command
  # Code signing — set these env vars in CI or locally:
  #   CSC_LINK: path to .p12 certificate
  #   CSC_KEY_PASSWORD: certificate password
  # Notarization — requires Apple Developer Program enrollment:
  #   APPLE_ID: your Apple ID email
  #   APPLE_APP_SPECIFIC_PASSWORD: app-specific password from appleid.apple.com
  #   APPLE_TEAM_ID: your 10-char team ID
  notarize: false # Set to true once Apple Developer certs are configured

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

pkg:
  installLocation: /Applications
  allowCurrentUserHome: false
  allowRootDirectory: false

# ── Windows ──
win:
  icon: electron/resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    # MSI requires code signing — uncomment when WIN_CSC_LINK is configured
    # - target: msi
    #   arch:
    #     - x64
  legalTrademarks: Copyright (c) 2026 Nomu
  # Code signing — set these env vars in CI or locally:
  #   WIN_CSC_LINK: path to .pfx certificate
  #   WIN_CSC_KEY_PASSWORD: certificate password

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: electron/resources/icon.ico
  uninstallerIcon: electron/resources/icon.ico
  installerHeaderIcon: electron/resources/icon.ico

msi:
  oneClick: false

# ── Linux ──
linux:
  icon: electron/resources/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64

# ── Auto-updates ──
publish:
  provider: github
  owner: nomubuilders
  repo: enterprise-software
