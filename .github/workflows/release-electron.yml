name: Release Electron App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: compliance-flow/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: compliance-flow/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: electron-vite build && electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set CSC_LINK and CSC_KEY_PASSWORD secrets for code signing
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: compliance-flow/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: compliance-flow/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD secrets for code signing
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compliance-flow/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: compliance-flow/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
